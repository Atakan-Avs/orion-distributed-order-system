version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: orion_postgres
    environment:
      POSTGRES_USER: orion_user
      POSTGRES_PASSWORD: orion_password
      POSTGRES_DB: orion_db
    ports:
      - "5435:5432"
    volumes:
      - orion_postgres_data:/var/lib/postgresql/data
    networks:
      - orion_network

  redis:
    image: redis:7
    container_name: orion_redis
    ports:
      - "6380:6379"
    networks:
      - orion_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: orion_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - orion_network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: orion_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: orion_zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://orion_kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - orion_network

volumes:
  orion_postgres_data:

networks:
  orion_network:
    driver: bridge